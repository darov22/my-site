<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NEO MUSIC | Плейлисты</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0b0b0b;
    font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
    color: #f0f0f0;
    min-height: 100vh;
    padding-bottom: 100px;
    overflow-x: hidden;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #1a1a1a; }
::-webkit-scrollbar-thumb { background: #ff7a00; border-radius: 10px; }

.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px 12px 24px;
    background: rgba(10, 10, 10, 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 122, 0, 0.5);
    position: sticky;
    top: 0;
    z-index: 20;
}

.header h2 {
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, #ff9a3c, #ff7a00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.5px;
}

.create-playlist-btn {
    background: linear-gradient(145deg, #1f1f1f, #141414);
    border: 1px solid rgba(255, 122, 0, 0.7);
    border-radius: 60px;
    width: 50px;
    height: 50px;
    font-size: 24px;
    font-weight: bold;
    color: #ff9f3c;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}
.create-playlist-btn:active { transform: scale(0.96); }

.playlists-container {
    margin: 24px 20px 110px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.playlist-card {
    background: rgba(22, 22, 22, 0.9);
    backdrop-filter: blur(4px);
    border-radius: 28px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    border-left: 4px solid #ff7a00;
    transition: 0.2s;
    position: relative;
}
.playlist-card:active { background: #292929; transform: scale(0.99); }

.playlist-cover {
    width: 60px;
    height: 60px;
    border-radius: 20px;
    background: linear-gradient(135deg, #ff7a00, #cc6200);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    flex-shrink: 0;
}

.playlist-info {
    flex: 1;
}

.playlist-name {
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 6px;
}

.playlist-count {
    font-size: 0.7rem;
    color: #ffaa66;
}

.empty-msg {
    text-align: center;
    padding: 50px;
    background: #111;
    border-radius: 40px;
    color: #777;
}

/* Модальное окно создания плейлиста */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.94);
    backdrop-filter: blur(18px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    visibility: hidden;
    opacity: 0;
    transition: 0.2s;
}
.modal.active {
    visibility: visible;
    opacity: 1;
}
.modal-card {
    background: #131313;
    width: 92%;
    max-width: 480px;
    border-radius: 44px;
    padding: 24px 22px 34px;
    border: 1px solid rgba(255, 122, 0, 0.7);
}
.modal-card h3 {
    font-size: 1.6rem;
    text-align: center;
    background: linear-gradient(135deg, #ffaa55, #ff7a00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 20px;
}
.modal-card input {
    width: 100%;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 30px;
    padding: 14px 18px;
    color: white;
    font-size: 1rem;
    margin-bottom: 20px;
}
.modal-actions {
    display: flex;
    gap: 14px;
}
.modal-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 40px;
    font-weight: bold;
    cursor: pointer;
    border: none;
}
.btn-cancel { background: #2c2c2c; color: #ccc; }
.btn-create { background: linear-gradient(95deg, #ff7a00, #ffaa33); color: #111; }

/* Страница деталей плейлиста */
.playlist-detail {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0b0b0b;
    z-index: 150;
    visibility: hidden;
    opacity: 0;
    transition: 0.3s ease;
    overflow-y: auto;
}
.playlist-detail.active {
    visibility: visible;
    opacity: 1;
}
.detail-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px;
    background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 122, 0, 0.5);
    position: sticky;
    top: 0;
}
.back-btn {
    background: none;
    border: none;
    font-size: 28px;
    cursor: pointer;
    color: #ffaa55;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.detail-info {
    flex: 1;
}
.detail-name {
    font-size: 1.4rem;
    font-weight: bold;
}
.detail-count {
    font-size: 0.8rem;
    color: #ffaa66;
    margin-top: 4px;
}
.detail-actions {
    display: flex;
    gap: 12px;
}
.delete-playlist-btn {
    background: rgba(255, 50, 50, 0.2);
    border: 1px solid #ff4444;
    border-radius: 30px;
    padding: 8px 16px;
    color: #ff8888;
    cursor: pointer;
}
.songs-list {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.detail-song {
    background: rgba(22, 22, 22, 0.9);
    border-radius: 20px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
}
.detail-song-cover {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: #ff7a00;
    object-fit: cover;
}
.detail-song-info {
    flex: 1;
}
.detail-song-title {
    font-weight: 600;
}
.detail-song-artist {
    font-size: 0.7rem;
    color: #ffaa66;
}
.remove-from-playlist {
    background: none;
    border: none;
    color: #ff6666;
    font-size: 20px;
    cursor: pointer;
    padding: 8px;
}

.navbar {
    position: fixed;
    bottom: 12px;
    left: 12px;
    right: 12px;
    height: 68px;
    background: rgba(10,10,10,0.94);
    backdrop-filter: blur(18px);
    border-radius: 38px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    box-shadow: 0 0 20px rgba(255,122,0,0.3);
    border: 1px solid rgba(255,122,0,0.5);
    z-index: 40;
}
.navbar div { font-size: 1.7rem; opacity: 0.7; cursor: pointer; transition: 0.2s; }
.navbar div:active { opacity: 1; transform: scale(1.1); }
.navbar div.active { opacity: 1; text-shadow: 0 0 10px #ff7a00; }
</style>
</head>
<body>

<div class="header">
    <h2>📁 МОИ ПЛЕЙЛИСТЫ</h2>
    <button class="create-playlist-btn" id="createPlaylistBtn">+</button>
</div>

<div class="playlists-container" id="playlistsContainer">
    <div class="empty-msg">🎵 Нет плейлистов<br>Нажми + чтобы создать</div>
</div>

<!-- Модальное окно создания плейлиста -->
<div id="createModal" class="modal">
    <div class="modal-card">
        <h3>✨ НОВЫЙ ПЛЕЙЛИСТ</h3>
        <input type="text" id="playlistNameInput" placeholder="Название плейлиста" maxlength="50">
        <div class="modal-actions">
            <button class="btn-cancel" id="cancelModalBtn">Отмена</button>
            <button class="btn-create" id="confirmCreateBtn">Создать</button>
        </div>
    </div>
</div>

<!-- Страница деталей плейлиста -->
<div id="playlistDetail" class="playlist-detail">
    <div class="detail-header">
        <button class="back-btn" id="closeDetailBtn">←</button>
        <div class="detail-info">
            <div class="detail-name" id="detailName">Плейлист</div>
            <div class="detail-count" id="detailCount">0 треков</div>
        </div>
        <div class="detail-actions">
            <button class="delete-playlist-btn" id="deletePlaylistBtn">🗑 Удалить</button>
        </div>
    </div>
    <div class="songs-list" id="songsList"></div>
</div>

<div class="navbar">
    <div class="nav-home">🏠</div>
    <div>🔥</div>
    <div class="nav-playlists active">📁</div>
    <div>👤</div>
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js",
      "firebase/storage": "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js"
    }
  }
</script>

<script type="module">
import { initializeApp } from "firebase/app";
import { getFirestore, collection, query, getDocs, addDoc, deleteDoc, doc, updateDoc, arrayUnion, arrayRemove } from "firebase/firestore";
import { getStorage } from "firebase/storage";

const firebaseConfig = {
  apiKey: "AIzaSyDBmazPKil5xsLBYteYftz_nmKnUdQojS0",
  authDomain: "egfdgdfg-3504c.firebaseapp.com",
  projectId: "egfdgdfg-3504c",
  storageBucket: "egfdgdfg-3504c.firebasestorage.app",
  messagingSenderId: "764542974854",
  appId: "1:764542974854:web:1f2621cfa613e85e4f4a07",
  measurementId: "G-8PTHXNW4C5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let playlists = [];
let allTracks = [];
let currentPlaylistId = null;

// ========== НАВИГАЦИЯ ==========
function goToHomePage() {
    window.location.href = 'player.html';
}

function goToPlaylistsPage() {
    // Уже на этой странице, просто обновляем
    loadPlaylists();
}

document.querySelector('.nav-home').addEventListener('click', goToHomePage);
document.querySelector('.nav-playlists').addEventListener('click', goToPlaylistsPage);

// Загрузка всех треков из Firebase
async function loadAllTracks() {
    try {
        const q = query(collection(db, "tracks"));
        const querySnapshot = await getDocs(q);
        allTracks = [];
        querySnapshot.forEach((doc) => {
            allTracks.push({ id: doc.id, ...doc.data() });
        });
    } catch (error) {
        console.error("Ошибка загрузки треков:", error);
    }
}

// Загрузка плейлистов
async function loadPlaylists() {
    await loadAllTracks();
    try {
        const q = query(collection(db, "playlists"));
        const querySnapshot = await getDocs(q);
        playlists = [];
        querySnapshot.forEach((doc) => {
            playlists.push({ id: doc.id, ...doc.data() });
        });
        renderPlaylists();
    } catch (error) {
        console.error("Ошибка загрузки плейлистов:", error);
    }
}

function renderPlaylists() {
    const container = document.getElementById("playlistsContainer");
    container.innerHTML = "";
    
    if (playlists.length === 0) {
        container.innerHTML = '<div class="empty-msg">🎵 Нет плейлистов<br>Нажми + чтобы создать</div>';
        return;
    }
    
    for (let i = 0; i < playlists.length; i++) {
        const playlist = playlists[i];
        const trackCount = playlist.tracks ? playlist.tracks.length : 0;
        const div = document.createElement("div");
        div.className = "playlist-card";
        div.innerHTML = `
            <div class="playlist-cover">📀</div>
            <div class="playlist-info">
                <div class="playlist-name">${escapeHtml(playlist.name)}</div>
                <div class="playlist-count">${trackCount} ${getTrackWord(trackCount)}</div>
            </div>
        `;
        div.addEventListener('click', () => openPlaylistDetail(playlist.id, playlist.name, playlist.tracks || []));
        container.appendChild(div);
    }
}

function getTrackWord(count) {
    if (count % 10 === 1 && count % 100 !== 11) return "трек";
    if ([2,3,4].includes(count % 10) && ![12,13,14].includes(count % 100)) return "трека";
    return "треков";
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Создание плейлиста
async function createPlaylist(name) {
    if (!name.trim()) {
        alert("Введите название плейлиста");
        return false;
    }
    try {
        await addDoc(collection(db, "playlists"), {
            name: name.trim(),
            tracks: [],
            createdAt: new Date().toISOString()
        });
        await loadPlaylists();
        return true;
    } catch (error) {
        console.error("Ошибка создания плейлиста:", error);
        alert("Ошибка при создании плейлиста");
        return false;
    }
}

// Открытие деталей плейлиста
function openPlaylistDetail(playlistId, playlistName, tracks) {
    currentPlaylistId = playlistId;
    const detailDiv = document.getElementById("playlistDetail");
    const detailName = document.getElementById("detailName");
    const detailCount = document.getElementById("detailCount");
    
    detailName.innerText = playlistName;
    detailCount.innerText = `${tracks.length} ${getTrackWord(tracks.length)}`;
    
    renderSongsInPlaylist(tracks);
    detailDiv.classList.add("active");
}

function renderSongsInPlaylist(trackIds) {
    const container = document.getElementById("songsList");
    container.innerHTML = "";
    
    if (!trackIds || trackIds.length === 0) {
        container.innerHTML = '<div class="empty-msg" style="margin: 40px;">🎵 Нет треков в плейлисте<br>Добавьте треки из главного экрана</div>';
        return;
    }
    
    // Находим полные данные треков по их ID
    for (let i = 0; i < trackIds.length; i++) {
        const trackId = trackIds[i];
        const track = allTracks.find(t => t.id === trackId);
        if (track) {
            const div = document.createElement("div");
            div.className = "detail-song";
            const coverSrc = track.coverUrl || "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff7a00'/%3E%3Ctext x='50' y='67' font-size='45' text-anchor='middle' fill='white'%3E🎵%3C/text%3E%3C/svg%3E";
            div.innerHTML = `
                <img class="detail-song-cover" src="${coverSrc}" alt="cover">
                <div class="detail-song-info">
                    <div class="detail-song-title">${escapeHtml(track.title)}</div>
                    <div class="detail-song-artist">${escapeHtml(track.artist || "Неизвестен")}</div>
                </div>
                <button class="remove-from-playlist" data-track-id="${track.id}">✖</button>
            `;
            div.querySelector('.remove-from-playlist').addEventListener('click', (e) => {
                e.stopPropagation();
                removeTrackFromPlaylist(track.id);
            });
            div.addEventListener('click', () => {
                // Переход на плеер с этим треком
                sessionStorage.setItem('playTrackOnHome', JSON.stringify(track));
                window.location.href = 'player.html';
            });
            container.appendChild(div);
        }
    }
}

// Удаление трека из плейлиста
async function removeTrackFromPlaylist(trackId) {
    if (!currentPlaylistId) return;
    try {
        const playlistRef = doc(db, "playlists", currentPlaylistId);
        await updateDoc(playlistRef, {
            tracks: arrayRemove(trackId)
        });
        // Обновляем локальные данные
        const playlist = playlists.find(p => p.id === currentPlaylistId);
        if (playlist) {
            playlist.tracks = (playlist.tracks || []).filter(id => id !== trackId);
            renderSongsInPlaylist(playlist.tracks);
            document.getElementById("detailCount").innerText = `${playlist.tracks.length} ${getTrackWord(playlist.tracks.length)}`;
            renderPlaylists(); // Обновляем список плейлистов
        }
    } catch (error) {
        console.error("Ошибка удаления трека:", error);
        alert("Ошибка при удалении трека из плейлиста");
    }
}

// Удаление всего плейлиста
async function deleteCurrentPlaylist() {
    if (!currentPlaylistId) return;
    if (!confirm("Вы уверены, что хотите удалить этот плейлист?")) return;
    try {
        await deleteDoc(doc(db, "playlists", currentPlaylistId));
        document.getElementById("playlistDetail").classList.remove("active");
        await loadPlaylists();
        currentPlaylistId = null;
    } catch (error) {
        console.error("Ошибка удаления плейлиста:", error);
        alert("Ошибка при удалении плейлиста");
    }
}

// Модальное окно создания плейлиста
const createModal = document.getElementById("createModal");
const createBtn = document.getElementById("createPlaylistBtn");
const cancelBtn = document.getElementById("cancelModalBtn");
const confirmBtn = document.getElementById("confirmCreateBtn");
const nameInput = document.getElementById("playlistNameInput");
const deletePlaylistBtn = document.getElementById("deletePlaylistBtn");
const closeDetailBtn = document.getElementById("closeDetailBtn");

function openCreateModal() {
    nameInput.value = "";
    createModal.classList.add("active");
}

function closeCreateModal() {
    createModal.classList.remove("active");
}

createBtn.onclick = openCreateModal;
cancelBtn.onclick = closeCreateModal;
createModal.onclick = (e) => { if (e.target === createModal) closeCreateModal(); };

confirmBtn.onclick = async () => {
    confirmBtn.disabled = true;
    confirmBtn.style.opacity = "0.6";
    await createPlaylist(nameInput.value);
    confirmBtn.disabled = false;
    confirmBtn.style.opacity = "1";
    closeCreateModal();
};

deletePlaylistBtn.onclick = deleteCurrentPlaylist;
closeDetailBtn.onclick = () => {
    document.getElementById("playlistDetail").classList.remove("active");
    currentPlaylistId = null;
};

// Загрузка плейлистов при старте
loadPlaylists();
</script>
</body>
</html>
