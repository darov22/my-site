<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NEO MUSIC | Плейлисты</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0b0b0b;
    font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
    color: #f0f0f0;
    min-height: 100vh;
    padding-bottom: 100px;
    overflow-x: hidden;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #1a1a1a; }
::-webkit-scrollbar-thumb { background: #ff7a00; border-radius: 10px; }

.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px 12px 24px;
    background: rgba(10, 10, 10, 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 122, 0, 0.5);
    position: sticky;
    top: 0;
    z-index: 20;
}

.header h2 {
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, #ff9a3c, #ff7a00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.5px;
}

.create-playlist-btn {
    background: linear-gradient(145deg, #1f1f1f, #141414);
    border: 1px solid rgba(255, 122, 0, 0.7);
    border-radius: 60px;
    width: 50px;
    height: 50px;
    font-size: 24px;
    font-weight: bold;
    color: #ff9f3c;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}
.create-playlist-btn:active { transform: scale(0.96); }

.playlists-container {
    margin: 24px 20px 110px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.playlist-card {
    background: rgba(22, 22, 22, 0.9);
    backdrop-filter: blur(4px);
    border-radius: 28px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    border-left: 4px solid #ff7a00;
    transition: 0.2s;
}
.playlist-card:active { background: #292929; transform: scale(0.99); }

.playlist-cover {
    width: 60px;
    height: 60px;
    border-radius: 20px;
    object-fit: cover;
    background: linear-gradient(135deg, #ff7a00, #cc6200);
    flex-shrink: 0;
}

.playlist-info {
    flex: 1;
}

.playlist-name {
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 6px;
}

.playlist-count {
    font-size: 0.7rem;
    color: #ffaa66;
}

.empty-msg {
    text-align: center;
    padding: 50px;
    background: #111;
    border-radius: 40px;
    color: #777;
}

/* Модальное окно создания плейлиста */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.94);
    backdrop-filter: blur(18px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    visibility: hidden;
    opacity: 0;
    transition: 0.2s;
}
.modal.active {
    visibility: visible;
    opacity: 1;
}
.modal-card {
    background: #131313;
    width: 92%;
    max-width: 480px;
    border-radius: 44px;
    padding: 24px 22px 34px;
    border: 1px solid rgba(255, 122, 0, 0.7);
}
.modal-card h3 {
    font-size: 1.6rem;
    text-align: center;
    background: linear-gradient(135deg, #ffaa55, #ff7a00);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 20px;
}
.modal-card input {
    width: 100%;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 30px;
    padding: 14px 18px;
    color: white;
    font-size: 1rem;
    margin-bottom: 20px;
}
.avatar-preview {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
}
.avatar-preview-img {
    width: 70px;
    height: 70px;
    border-radius: 24px;
    background: #2c2c2c;
    object-fit: cover;
}
.avatar-select-btn {
    background: #2a2a2a;
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 14px;
}
.modal-actions {
    display: flex;
    gap: 14px;
}
.modal-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 40px;
    font-weight: bold;
    cursor: pointer;
    border: none;
}
.btn-cancel { background: #2c2c2c; color: #ccc; }
.btn-create { background: linear-gradient(95deg, #ff7a00, #ffaa33); color: #111; }

/* Страница деталей плейлиста */
.playlist-detail {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0b0b0b;
    z-index: 150;
    visibility: hidden;
    opacity: 0;
    transition: 0.3s ease;
    overflow-y: auto;
}
.playlist-detail.active {
    visibility: visible;
    opacity: 1;
}
.detail-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px;
    background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 122, 0, 0.5);
    position: sticky;
    top: 0;
    flex-wrap: wrap;
}
.back-btn {
    background: none;
    border: none;
    font-size: 28px;
    cursor: pointer;
    color: #ffaa55;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.detail-avatar {
    width: 56px;
    height: 56px;
    border-radius: 20px;
    object-fit: cover;
}
.detail-info {
    flex: 1;
}
.detail-name {
    font-size: 1.4rem;
    font-weight: bold;
}
.detail-count {
    font-size: 0.8rem;
    color: #ffaa66;
    margin-top: 4px;
}
.detail-actions {
    display: flex;
    gap: 12px;
    align-items: center;
}
.play-playlist-btn {
    background: linear-gradient(95deg, #ff7a00, #ffaa33);
    border: none;
    border-radius: 40px;
    padding: 10px 20px;
    color: #111;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
}
.play-playlist-btn:active {
    transform: scale(0.96);
}
.delete-playlist-btn {
    background: rgba(255, 50, 50, 0.2);
    border: 1px solid #ff4444;
    border-radius: 30px;
    padding: 8px 16px;
    color: #ff8888;
    cursor: pointer;
}
.songs-list {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 100px;
}
.detail-song {
    background: rgba(22, 22, 22, 0.9);
    border-radius: 20px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
}
.detail-song:active {
    background: #292929;
}
.detail-song-cover {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: #ff7a00;
    object-fit: cover;
}
.detail-song-info {
    flex: 1;
}
.detail-song-title {
    font-weight: 600;
}
.detail-song-artist {
    font-size: 0.7rem;
    color: #ffaa66;
}
.remove-from-playlist {
    background: none;
    border: none;
    color: #ff6666;
    font-size: 20px;
    cursor: pointer;
    padding: 8px;
}
.remove-from-playlist:active {
    transform: scale(0.9);
}

.navbar {
    position: fixed;
    bottom: 12px;
    left: 12px;
    right: 12px;
    height: 68px;
    background: rgba(10,10,10,0.94);
    backdrop-filter: blur(18px);
    border-radius: 38px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    box-shadow: 0 0 20px rgba(255,122,0,0.3);
    border: 1px solid rgba(255,122,0,0.5);
    z-index: 100;
}
.navbar div { 
    font-size: 1.7rem; 
    opacity: 0.7; 
    cursor: pointer; 
    transition: 0.2s;
    padding: 10px 20px;
    border-radius: 40px;
}
.navbar div:active { 
    opacity: 1; 
    transform: scale(1.1);
    background: rgba(255, 122, 0, 0.2);
}
.navbar div.active { 
    opacity: 1; 
    text-shadow: 0 0 10px #ff7a00;
}

.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.96);
    backdrop-filter: blur(24px);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
    visibility: hidden;
    opacity: 0;
}
.loading-overlay.active {
    visibility: visible;
    opacity: 1;
}
.loading-card {
    text-align: center;
    background: #131313;
    padding: 30px 32px;
    border-radius: 64px;
    border: 1px solid #ff7a00;
}
.spinner {
    width: 52px;
    height: 52px;
    border: 4px solid #2a2a2a;
    border-top: 4px solid #ff7a00;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 20px;
}
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Панель "Сейчас играет" */
.now-playing-bar {
    position: fixed;
    bottom: 90px;
    left: 20px;
    right: 20px;
    background: rgba(30, 30, 30, 0.95);
    backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 95;
    border: 1px solid rgba(255, 122, 0, 0.5);
    transform: translateY(100px);
    transition: 0.3s;
    opacity: 0;
    visibility: hidden;
}
.now-playing-bar.show {
    transform: translateY(0);
    opacity: 1;
    visibility: visible;
}
.now-playing-cover {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    object-fit: cover;
}
.now-playing-info {
    flex: 1;
}
.now-playing-title {
    font-size: 13px;
    font-weight: 600;
}
.now-playing-artist {
    font-size: 10px;
    color: #ffaa66;
}
.now-playing-control {
    background: #ff7a00;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
.now-playing-close {
    background: none;
    border: none;
    color: #aaa;
    font-size: 20px;
    cursor: pointer;
    width: 36px;
    height: 36px;
}
</style>
</head>
<body>

<div class="header">
    <h2>📁 МОИ ПЛЕЙЛИСТЫ</h2>
    <button class="create-playlist-btn" id="createPlaylistBtn">+</button>
</div>

<div class="playlists-container" id="playlistsContainer">
    <div class="empty-msg">🎵 Нет плейлистов<br>Нажми + чтобы создать</div>
</div>

<!-- Модальное окно создания плейлиста -->
<div id="createModal" class="modal">
    <div class="modal-card">
        <h3>✨ НОВЫЙ ПЛЕЙЛИСТ</h3>
        <input type="text" id="playlistNameInput" maxlength="50" placeholder="Название плейлиста (макс 50)">
        <div class="avatar-preview">
            <img id="playlistAvatarPreview" class="avatar-preview-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff7a00'/%3E%3Ctext x='50' y='67' font-size='45' text-anchor='middle' fill='white'%3E📀%3C/text%3E%3C/svg%3E" alt="avatar">
            <div class="avatar-select-btn" id="selectAvatarBtnModal">🖼️ Выбрать обложку</div>
        </div>
        <input type="file" id="avatarFileModal" accept="image/jpeg,image/png" style="display:none">
        <div class="modal-actions">
            <button class="btn-cancel" id="cancelModalBtn">Отмена</button>
            <button class="btn-create" id="confirmModalBtn">Создать</button>
        </div>
    </div>
</div>

<!-- Страница деталей плейлиста -->
<div id="playlistDetail" class="playlist-detail">
    <div class="detail-header">
        <button class="back-btn" id="closeDetailBtn">←</button>
        <img id="detailAvatar" class="detail-avatar" src="" alt="avatar">
        <div class="detail-info">
            <div class="detail-name" id="detailName">Плейлист</div>
            <div class="detail-count" id="detailCount">0 треков</div>
        </div>
        <div class="detail-actions">
            <button class="play-playlist-btn" id="playPlaylistBtn">▶ Воспроизвести</button>
            <button class="delete-playlist-btn" id="deletePlaylistBtn">🗑</button>
        </div>
    </div>
    <div class="songs-list" id="songsList"></div>
</div>

<!-- Плавающая панель сейчас играет -->
<div id="nowPlayingBar" class="now-playing-bar">
    <img id="npCover" class="now-playing-cover" src="" alt="cover">
    <div class="now-playing-info">
        <div id="npTitle" class="now-playing-title">Трек</div>
        <div id="npArtist" class="now-playing-artist">Исполнитель</div>
    </div>
    <button id="npPlayPause" class="now-playing-control">▶</button>
    <button id="npClose" class="now-playing-close">✖</button>
</div>

<div class="navbar">
    <div class="nav-home">🏠</div>
    <div>🔥</div>
    <div class="nav-playlists active">📁</div>
    <div>👤</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDBmazPKil5xsLBYteYftz_nmKnUdQojS0",
  authDomain: "egfdgdfg-3504c.firebaseapp.com",
  projectId: "egfdgdfg-3504c",
  storageBucket: "egfdgdfg-3504c.firebasestorage.app",
  messagingSenderId: "764542974854",
  appId: "1:764542974854:web:1f2621cfa613e85e4f4a07",
  measurementId: "G-8PTHXNW4C5"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);

let userPlaylists = [];
let currentPlaylistId = null;
let playlistAudio = null;
let isPlayingPlaylist = false;
let currentPlayingTrackIndex = 0;
let currentPlayingTracks = [];
let currentPlayingPlaylistId = null;

// Навигация
function goToHomePage() {
    // Не останавливаем музыку при переходе!
    window.location.href = 'player.html';
}

document.querySelector('.nav-home')?.addEventListener('click', goToHomePage);
document.querySelector('.nav-playlists')?.classList.add('active');

// Загрузка из localStorage
function loadPlaylists() {
    const stored = localStorage.getItem('neo_user_playlists');
    if (stored) {
        try {
            userPlaylists = JSON.parse(stored);
        } catch(e) { userPlaylists = []; }
    }
    if (!userPlaylists) userPlaylists = [];
    renderPlaylists();
}

function savePlaylists() {
    localStorage.setItem('neo_user_playlists', JSON.stringify(userPlaylists));
}

function renderPlaylists() {
    const container = document.getElementById("playlistsContainer");
    container.innerHTML = "";
    
    if (userPlaylists.length === 0) {
        container.innerHTML = '<div class="empty-msg">🎵 Нет плейлистов<br>Нажми + чтобы создать</div>';
        return;
    }
    
    for (const playlist of userPlaylists) {
        const div = document.createElement("div");
        div.className = "playlist-card";
        const avatarUrl = playlist.avatarUrl || "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff7a00'/%3E%3Ctext x='50' y='67' font-size='45' text-anchor='middle' fill='white'%3E📀%3C/text%3E%3C/svg%3E";
        div.innerHTML = `
            <img class="playlist-cover" src="${avatarUrl}" alt="avatar" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ff7a00%22/%3E%3Ctext x=%2250%22 y=%2267%22 font-size=%2245%22 text-anchor=%22middle%22 fill=%22white%22%3E📀%3C/text%3E%3C/svg%3E'">
            <div class="playlist-info">
                <div class="playlist-name">${escapeHtml(playlist.name)}</div>
                <div class="playlist-count">${playlist.tracks.length} ${getTrackWord(playlist.tracks.length)}</div>
            </div>
        `;
        div.addEventListener('click', () => openPlaylistDetail(playlist.id));
        container.appendChild(div);
    }
}

function getTrackWord(count) {
    if (count % 10 === 1 && count % 100 !== 11) return "трек";
    if ([2,3,4].includes(count % 10) && ![12,13,14].includes(count % 100)) return "трека";
    return "треков";
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function showNotification(message, color) {
    let notif = document.createElement("div");
    notif.innerText = message;
    notif.style.position = "fixed";
    notif.style.bottom = "180px";
    notif.style.left = "20px";
    notif.style.right = "20px";
    notif.style.backgroundColor = "#1a1a1a";
    notif.style.color = color;
    notif.style.padding = "12px";
    notif.style.borderRadius = "40px";
    notif.style.textAlign = "center";
    notif.style.zIndex = "999";
    notif.style.border = `1px solid ${color}`;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 2500);
}

function showLoading() {
    let loader = document.getElementById("loadingOverlay");
    if (!loader) {
        loader = document.createElement("div");
        loader.id = "loadingOverlay";
        loader.className = "loading-overlay";
        loader.innerHTML = '<div class="loading-card"><div class="spinner"></div><p>Загрузка...</p></div>';
        document.body.appendChild(loader);
    }
    loader.classList.add("active");
}

function hideLoading() {
    const loader = document.getElementById("loadingOverlay");
    if (loader) loader.classList.remove("active");
}

// Создание плейлиста
let selectedAvatar = null;

async function createPlaylist(name, avatarFile) {
    if (!name.trim()) {
        showNotification("❌ Введите название", "#ff8888");
        return false;
    }
    
    showLoading();
    
    let avatarUrl = null;
    if (avatarFile) {
        try {
            const avatarId = Date.now() + "_" + Math.random().toString(36).substr(2, 6);
            const avatarRef = ref(storage, `playlist_avatars/${avatarId}.jpg`);
            await uploadBytes(avatarRef, avatarFile);
            avatarUrl = await getDownloadURL(avatarRef);
        } catch(e) {
            console.error("Ошибка загрузки аватарки:", e);
        }
    }
    
    const newPlaylist = {
        id: Date.now().toString(),
        name: name.trim(),
        avatarUrl: avatarUrl,
        tracks: [],
        createdAt: new Date().toISOString()
    };
    
    userPlaylists.push(newPlaylist);
    savePlaylists();
    renderPlaylists();
    hideLoading();
    showNotification(`✅ Плейлист "${name}" создан!`, "#aaffaa");
    return true;
}

// Открытие деталей плейлиста
function openPlaylistDetail(playlistId) {
    // НЕ останавливаем музыку при открытии деталей!
    currentPlaylistId = playlistId;
    const playlist = userPlaylists.find(p => p.id === playlistId);
    if (!playlist) return;
    
    const detailDiv = document.getElementById("playlistDetail");
    document.getElementById("detailName").innerText = playlist.name;
    document.getElementById("detailCount").innerText = `${playlist.tracks.length} ${getTrackWord(playlist.tracks.length)}`;
    const avatarUrl = playlist.avatarUrl || "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff7a00'/%3E%3Ctext x='50' y='67' font-size='45' text-anchor='middle' fill='white'%3E📀%3C/text%3E%3C/svg%3E";
    document.getElementById("detailAvatar").src = avatarUrl;
    
    renderSongsInPlaylist(playlist.tracks);
    detailDiv.classList.add("active");
}

function renderSongsInPlaylist(tracks) {
    const container = document.getElementById("songsList");
    container.innerHTML = "";
    
    if (!tracks || tracks.length === 0) {
        container.innerHTML = '<div class="empty-msg" style="margin: 40px;">🎵 Нет треков в плейлисте<br>Добавьте треки из главного экрана</div>';
        return;
    }
    
    for (let i = 0; i < tracks.length; i++) {
        const track = tracks[i];
        const div = document.createElement("div");
        div.className = "detail-song";
        const coverSrc = track.coverUrl || "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff7a00'/%3E%3Ctext x='50' y='67' font-size='45' text-anchor='middle' fill='white'%3E🎵%3C/text%3E%3C/svg%3E";
        div.innerHTML = `
            <img class="detail-song-cover" src="${coverSrc}" alt="cover" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ff7a00%22/%3E%3Ctext x=%2250%22 y=%2267%22 font-size=%2245%22 text-anchor=%22middle%22 fill=%22white%22%3E🎵%3C/text%3E%3C/svg%3E'">
            <div class="detail-song-info">
                <div class="detail-song-title">${escapeHtml(track.title)}</div>
                <div class="detail-song-artist">${escapeHtml(track.artist || "Неизвестен")}</div>
            </div>
            <button class="remove-from-playlist" data-track-id="${track.id}">✖</button>
        `;
        div.querySelector('.remove-from-playlist').addEventListener('click', (e) => {
            e.stopPropagation();
            removeTrackFromPlaylist(track.id);
        });
        div.addEventListener('click', () => {
            playSingleTrack(track);
        });
        container.appendChild(div);
    }
}

function playSingleTrack(track) {
    // Останавливаем воспроизведение плейлиста
    if (playlistAudio) {
        playlistAudio.pause();
        playlistAudio = null;
    }
    isPlayingPlaylist = false;
    currentPlayingPlaylistId = null;
    hideNowPlayingBar();
    sessionStorage.setItem('playTrackOnHome', JSON.stringify(track));
    window.location.href = 'player.html';
}

function removeTrackFromPlaylist(trackId) {
    const playlist = userPlaylists.find(p => p.id === currentPlaylistId);
    if (playlist) {
        playlist.tracks = playlist.tracks.filter(t => t.id !== trackId);
        savePlaylists();
        renderSongsInPlaylist(playlist.tracks);
        document.getElementById("detailCount").innerText = `${playlist.tracks.length} ${getTrackWord(playlist.tracks.length)}`;
        renderPlaylists();
        showNotification("🗑 Трек удален из плейлиста", "#ffaa66");
        
        // Если удалили трек из текущего воспроизводимого плейлиста
        if (currentPlayingPlaylistId === playlist.id && currentPlayingTracks.length > 0) {
            currentPlayingTracks = playlist.tracks;
            if (currentPlayingTrackIndex >= currentPlayingTracks.length) {
                stopPlaylist();
            } else if (playlistAudio && playlistAudio.src) {
                // Если текущий трек удалили, переключаем на следующий
                const currentTrackId = currentPlayingTracks[currentPlayingTrackIndex]?.id;
                if (trackId === currentTrackId) {
                    playNextTrack();
                }
            }
        }
    }
}

function deleteCurrentPlaylist() {
    if (!currentPlaylistId) return;
    if (!confirm("Вы уверены, что хотите удалить этот плейлист?")) return;
    
    // Если удаляем текущий воспроизводимый плейлист, останавливаем
    if (currentPlaylistId === currentPlayingPlaylistId) {
        stopPlaylist();
    }
    
    userPlaylists = userPlaylists.filter(p => p.id !== currentPlaylistId);
    savePlaylists();
    renderPlaylists();
    document.getElementById("playlistDetail").classList.remove("active");
    currentPlaylistId = null;
    showNotification("✅ Плейлист удален", "#aaffaa");
}

// ========== ВОСПРОИЗВЕДЕНИЕ ПЛЕЙЛИСТА ==========
function initAudio() {
    if (!playlistAudio) {
        playlistAudio = new Audio();
        playlistAudio.addEventListener('ended', () => {
            playNextTrack();
        });
    }
}

function playPlaylist() {
    const playlist = userPlaylists.find(p => p.id === currentPlaylistId);
    if (!playlist || playlist.tracks.length === 0) {
        showNotification("❌ В плейлисте нет треков", "#ff8888");
        return;
    }
    
    // Останавливаем предыдущее воспроизведение
    if (playlistAudio) {
        playlistAudio.pause();
    }
    
    currentPlayingPlaylistId = playlist.id;
    currentPlayingTracks = [...playlist.tracks];
    currentPlayingTrackIndex = 0;
    playTrackFromPlaylist(0);
    showNowPlayingBar();
}

function playTrackFromPlaylist(index) {
    if (index >= currentPlayingTracks.length) {
        // Плейлист закончился
        stopPlaylist();
        return;
    }
    
    const track = currentPlayingTracks[index];
    currentPlayingTrackIndex = index;
    
    initAudio();
    playlistAudio.src = track.mp3Url;
    playlistAudio.load();
    playlistAudio.play().catch(e => console.log(e));
    
    updateNowPlayingInfo(track);
    isPlayingPlaylist = true;
    document.getElementById('npPlayPause').innerHTML = '⏸';
}

function playNextTrack() {
    playTrackFromPlaylist(currentPlayingTrackIndex + 1);
}

function playPrevTrack() {
    playTrackFromPlaylist(currentPlayingTrackIndex - 1);
}

function togglePlayPausePlaylist() {
    if (!playlistAudio) return;
    if (!playlistAudio.paused) {
        playlistAudio.pause();
        isPlayingPlaylist = false;
        document.getElementById('npPlayPause').innerHTML = '▶';
    } else {
        playlistAudio.play();
        isPlayingPlaylist = true;
        document.getElementById('npPlayPause').innerHTML = '⏸';
    }
}

function updateNowPlayingInfo(track) {
    document.getElementById('npTitle').innerText = track.title || "Трек";
    document.getElementById('npArtist').innerText = track.artist || "Неизвестен";
    const coverUrl = track.coverUrl || "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff7a00'/%3E%3Ctext x='50' y='67' font-size='45' text-anchor='middle' fill='white'%3E🎵%3C/text%3E%3C/svg%3E";
    document.getElementById('npCover').src = coverUrl;
}

function showNowPlayingBar() {
    const bar = document.getElementById('nowPlayingBar');
    bar.classList.add('show');
}

function hideNowPlayingBar() {
    const bar = document.getElementById('nowPlayingBar');
    bar.classList.remove('show');
}

function stopPlaylist() {
    if (playlistAudio) {
        playlistAudio.pause();
        playlistAudio = null;
    }
    isPlayingPlaylist = false;
    currentPlayingPlaylistId = null;
    currentPlayingTracks = [];
    currentPlayingTrackIndex = 0;
    hideNowPlayingBar();
}

// Модальное окно
const createModal = document.getElementById("createModal");
const createBtn = document.getElementById("createPlaylistBtn");
const cancelBtn = document.getElementById("cancelModalBtn");
const confirmBtn = document.getElementById("confirmModalBtn");
const nameInput = document.getElementById("playlistNameInput");
const deletePlaylistBtn = document.getElementById("deletePlaylistBtn");
const closeDetailBtn = document.getElementById("closeDetailBtn");
const selectAvatarBtn = document.getElementById("selectAvatarBtnModal");
const avatarFileInput = document.getElementById("avatarFileModal");
const avatarPreview = document.getElementById("playlistAvatarPreview");
const playPlaylistBtn = document.getElementById("playPlaylistBtn");

function openCreateModal() {
    nameInput.value = "";
    avatarPreview.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff7a00'/%3E%3Ctext x='50' y='67' font-size='45' text-anchor='middle' fill='white'%3E📀%3C/text%3E%3C/svg%3E";
    selectedAvatar = null;
    createModal.classList.add("active");
}

function closeCreateModal() {
    createModal.classList.remove("active");
}

createBtn.onclick = openCreateModal;
cancelBtn.onclick = closeCreateModal;
createModal.onclick = (e) => { if (e.target === createModal) closeCreateModal(); };

selectAvatarBtn.onclick = () => avatarFileInput.click();

avatarFileInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (file && file.type.startsWith("image/")) {
        selectedAvatar = file;
        const reader = new FileReader();
        reader.onload = ev => {
            avatarPreview.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }
});

confirmBtn.onclick = async () => {
    confirmBtn.disabled = true;
    confirmBtn.style.opacity = "0.6";
    await createPlaylist(nameInput.value, selectedAvatar);
    confirmBtn.disabled = false;
    confirmBtn.style.opacity = "1";
    closeCreateModal();
};

deletePlaylistBtn.onclick = deleteCurrentPlaylist;

closeDetailBtn.onclick = () => {
    document.getElementById("playlistDetail").classList.remove("active");
    currentPlaylistId = null;
    // НЕ останавливаем музыку при закрытии деталей!
    // Музыка продолжает играть в фоне
};

playPlaylistBtn.onclick = () => {
    playPlaylist();
};

// Кнопки панели "Сейчас играет"
document.getElementById('npPlayPause').onclick = togglePlayPausePlaylist;
document.getElementById('npClose').onclick = stopPlaylist;

// При загрузке страницы, если есть сохраненное состояние воспроизведения, восстанавливаем панель
function restorePlaybackState() {
    if (currentPlayingPlaylistId && playlistAudio && !playlistAudio.paused) {
        showNowPlayingBar();
        const currentTrack = currentPlayingTracks[currentPlayingTrackIndex];
        if (currentTrack) {
            updateNowPlayingInfo(currentTrack);
        }
        document.getElementById('npPlayPause').innerHTML = '⏸';
    }
}

// Инициализация
loadPlaylists();

// Сохраняем состояние перед уходом со страницы
window.addEventListener('beforeunload', () => {
    if (playlistAudio && !playlistAudio.paused) {
        // Сохраняем состояние в sessionStorage
        const state = {
            playlistId: currentPlayingPlaylistId,
            trackIndex: currentPlayingTrackIndex,
            tracks: currentPlayingTracks,
            currentTime: playlistAudio.currentTime
        };
        sessionStorage.setItem('playlistPlaybackState', JSON.stringify(state));
    }
});

// Восстанавливаем состояние при загрузке
const savedState = sessionStorage.getItem('playlistPlaybackState');
if (savedState) {
    try {
        const state = JSON.parse(savedState);
        if (state.playlistId && state.tracks && state.tracks.length > 0) {
            currentPlayingPlaylistId = state.playlistId;
            currentPlayingTracks = state.tracks;
            currentPlayingTrackIndex = state.trackIndex;
            
            initAudio();
            const track = currentPlayingTracks[currentPlayingTrackIndex];
            if (track) {
                playlistAudio.src = track.mp3Url;
                playlistAudio.currentTime = state.currentTime || 0;
                playlistAudio.play().catch(e => console.log(e));
                updateNowPlayingInfo(track);
                showNowPlayingBar();
                document.getElementById('npPlayPause').innerHTML = '⏸';
                isPlayingPlaylist = true;
            }
        }
        sessionStorage.removeItem('playlistPlaybackState');
    } catch(e) {}
}
</script>
</body>
</html>
