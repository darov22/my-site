<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NEO MUSIC</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="splash-loader" id="splashLoader">
    <div class="loader-ring"></div>
    <div class="loader-text">NEO MUSIC</div>
    <div class="loader-sub">загрузка треков из облака...</div>
    <div class="loader-progress-track"><div class="loader-progress-fill" id="splashProgressFill"></div></div>
</div>

<div class="header-plus">
    <h2>🔥 NEO MUSIC</h2>
    <button class="plus-add-btn" id="openModalBtn">+</button>
</div>

<div id="playlist"></div>

<!-- Модальное окно -->
<div id="overlayForm" class="overlay-form">
    <div class="modal-card">
        <h3>📀 ЗАГРУЗИТЬ ТРЕК</h3>
        <div class="input-group">
            <label>🎵 НАЗВАНИЕ (макс 100)</label>
            <input type="text" id="trackTitle" maxlength="100" placeholder="Например: Неоновая ночь">
            <div class="char-counter"><span id="titleCount">0</span>/100</div>
        </div>
        <div class="input-group">
            <label>🎤 ИСПОЛНИТЕЛЬ (макс 50)</label>
            <input type="text" id="trackArtist" maxlength="50" placeholder="Автор / группа">
            <div class="char-counter"><span id="artistCount">0</span>/50</div>
        </div>
        <div class="input-group">
            <label>🎵 MP3 ФАЙЛ (до 50 МБ, только .mp3)</label>
            <input type="file" id="mp3File" accept=".mp3" style="display:none">
            <div class="file-label" id="mp3Label">📂 ВЫБРАТЬ MP3</div>
            <div class="file-info" id="mp3FileName">Файл не выбран</div>
        </div>
        <div class="input-group">
            <label>🖼️ ОБЛОЖКА (jpg/png, опционально)</label>
            <input type="file" id="coverFile" accept="image/jpeg,image/png,image/jpg" style="display:none">
            <div class="file-label" id="coverLabel">🖌️ ВЫБРАТЬ ОБЛОЖКУ</div>
            <div class="preview-cover" id="coverPreviewArea" style="display:none;">
                <img id="coverPreviewImg" class="preview-img" src="" alt="preview">
                <span id="coverName" style="font-size:12px;">обложка</span>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" id="cancelModalBtn">Отмена</button>
            <button class="btn-submit" id="submitTrackBtn">➕ СОХРАНИТЬ ТРЕК</button>
        </div>
    </div>
</div>

<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-card">
        <div class="spinner"></div>
        <p>☁️ Загрузка в облако</p>
        <div class="progress-bar-container"><div class="progress-bar-fill" id="progressBarFill"></div></div>
        <div class="loading-percent" id="loadingPercent">0%</div>
        <div class="loading-progress-text" id="loadingStatus">Подготовка...</div>
    </div>
</div>

<div class="navbar">
    <div>🏠</div>
    <div>🔥</div>
    <div>📁</div>
    <div>👤</div>
</div>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js",
        "firebase/storage": "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js"
    }
}
</script>

<script src="js/player.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
