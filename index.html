<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Music Player</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

/* Контент */
.content {
    padding-bottom: 100px;
}

/* Плеер */
.player {
    margin-top: 40px;
}

button {
    padding: 12px 22px;
    margin: 10px;
    border: none;
    border-radius: 12px;
    background: #ff7a00;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

/* Список */
.song {
    padding: 12px;
    border-bottom: 1px solid #222;
    cursor: pointer;
}

.song:hover {
    background: #1a1a1a;
}

/* ===== КРАСИВАЯ ПАНЕЛЬ ===== */
.navbar {
    position: fixed;
    bottom: 15px;
    left: 10px;
    right: 10px;
    height: 75px;
    background: rgba(20,20,20,0.9);
    backdrop-filter: blur(10px);
    border-radius: 25px;
    display: flex;
    justify-content: space-around;
    align-items: center;

    /* свечение */
    box-shadow: 0 0 20px rgba(255,122,0,0.4);
}

/* кнопки */
.nav-item {
    color: #888;
    font-size: 13px;
    cursor: pointer;
    transition: 0.3s;
}

.nav-item.active {
    color: #ff7a00;
    text-shadow: 0 0 10px rgba(255,122,0,0.7);
}

/* секции */
.section {
    display: none;
}

.section.active {
    display: block;
}

/* 📱 адаптация под телефон */
@media (max-width: 600px) {
    .navbar {
        height: 90px;
        border-radius: 30px;
    }

    .nav-item {
        font-size: 15px;
    }
}
</style>

</head>
<body>

<div class="content">

<!-- HOME -->
<div id="home" class="section active">
    <h1>🏠 Главная</h1>

    <div class="player">
        <audio id="audio"></audio>

        <div>
            <button onclick="prev()">⏮</button>
            <button onclick="play()">▶ / ⏸</button>
            <button onclick="next()">⏭</button>
        </div>

        <h2 id="title">Ничего не играет</h2>
    </div>

    <div id="playlist"></div>
</div>

<!-- TOP -->
<div id="top" class="section">
    <h1>🔥 Топ музыка</h1>
</div>

<!-- PLAYLIST -->
<div id="playlists" class="section">
    <h1>📁 Плейлисты</h1>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
    <h1>👤 Профиль</h1>
</div>

</div>

<!-- ПАНЕЛЬ -->
<div class="navbar">
    <div class="nav-item active" onclick="openTab('home', this)">🏠<br>Дом</div>
    <div class="nav-item" onclick="openTab('top', this)">🔥<br>Топ</div>
    <div class="nav-item" onclick="openTab('playlists', this)">📁<br>Плейлисты</div>
    <div class="nav-item" onclick="openTab('profile', this)">👤<br>Профиль</div>
</div>

<script>
const songs = [
    {
        title: "Трек 1",
        src: "https://darov22.github.io/my-site/music/song1.mp3"
    }
];

let current = 0;
const audio = document.getElementById("audio");
const title = document.getElementById("title");
const playlist = document.getElementById("playlist");

function loadSong(index) {
    current = index;
    audio.src = songs[index].src;
    title.innerText = songs[index].title;
}

function play() {
    if (audio.paused) audio.play();
    else audio.pause();
}

function next() {
    current = (current + 1) % songs.length;
    loadSong(current);
    audio.play();
}

function prev() {
    current = (current - 1 + songs.length) % songs.length;
    loadSong(current);
    audio.play();
}

// список
songs.forEach((song, index) => {
    const div = document.createElement("div");
    div.className = "song";
    div.innerText = song.title;
    div.onclick = () => {
        loadSong(index);
        audio.play();
    };
    playlist.appendChild(div);
});

loadSong(0);

// вкладки
function openTab(tabId, el) {
    document.querySelectorAll(".section").forEach(sec => {
        sec.classList.remove("active");
    });

    document.getElementById(tabId).classList.add("active");

    document.querySelectorAll(".nav-item").forEach(item => {
        item.classList.remove("active");
    });

    el.classList.add("active");
}
</script>

</body>
</html>
