<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Music Player</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #121212;
    color: white;
    text-align: center;
}

/* Основной контент */
.content {
    padding-bottom: 80px;
}

/* Плеер */
.player {
    margin-top: 40px;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    background: #1db954;
    color: white;
    cursor: pointer;
}

.song {
    padding: 10px;
    border-bottom: 1px solid #333;
    cursor: pointer;
}

.song:hover {
    background: #222;
}

/* Нижняя панель */
.navbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 70px;
    background: #181818;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid #333;
}

.nav-item {
    color: #aaa;
    font-size: 14px;
    cursor: pointer;
}

.nav-item.active {
    color: #1db954;
}

/* Секции */
.section {
    display: none;
}

.section.active {
    display: block;
}
</style>

</head>
<body>

<div class="content">

<!-- HOME -->
<div id="home" class="section active">
    <h1>🏠 Главная</h1>

    <div class="player">
        <audio id="audio"></audio>

        <div>
            <button onclick="prev()">⏮</button>
            <button onclick="play()">▶ / ⏸</button>
            <button onclick="next()">⏭</button>
        </div>

        <h2 id="title">Ничего не играет</h2>
    </div>

    <div id="playlist"></div>
</div>

<!-- TOP -->
<div id="top" class="section">
    <h1>🔥 Топ музыка</h1>
    <p>Тут будет топ треков</p>
</div>

<!-- PLAYLIST -->
<div id="playlists" class="section">
    <h1>📁 Плейлисты</h1>
    <p>Тут будут твои плейлисты</p>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
    <h1>👤 Профиль</h1>
    <p>Тут будет профиль</p>
</div>

</div>

<!-- НИЖНЯЯ ПАНЕЛЬ -->
<div class="navbar">
    <div class="nav-item active" onclick="openTab('home', this)">🏠<br>Дом</div>
    <div class="nav-item" onclick="openTab('top', this)">🔥<br>Топ</div>
    <div class="nav-item" onclick="openTab('playlists', this)">📁<br>Плейлисты</div>
    <div class="nav-item" onclick="openTab('profile', this)">👤<br>Профиль</div>
</div>

<script>
const songs = [
    {
        title: "Трек 1",
        src: "https://darov22.github.io/my-site/music/song1.mp3"
    }
];

let current = 0;
const audio = document.getElementById("audio");
const title = document.getElementById("title");
const playlist = document.getElementById("playlist");

// загрузка песни
function loadSong(index) {
    current = index;
    audio.src = songs[index].src;
    title.innerText = songs[index].title;
}

function play() {
    if (audio.paused) audio.play();
    else audio.pause();
}

function next() {
    current = (current + 1) % songs.length;
    loadSong(current);
    audio.play();
}

function prev() {
    current = (current - 1 + songs.length) % songs.length;
    loadSong(current);
    audio.play();
}

// список песен
songs.forEach((song, index) => {
    const div = document.createElement("div");
    div.className = "song";
    div.innerText = song.title;
    div.onclick = () => {
        loadSong(index);
        audio.play();
    };
    playlist.appendChild(div);
});

loadSong(0);

// переключение вкладок
function openTab(tabId, el) {
    document.querySelectorAll(".section").forEach(sec => {
        sec.classList.remove("active");
    });

    document.getElementById(tabId).classList.add("active");

    document.querySelectorAll(".nav-item").forEach(item => {
        item.classList.remove("active");
    });

    el.classList.add("active");
}
</script>

</body>
</html>
