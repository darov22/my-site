<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Music Player</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background: #0f0f0f; color:white; text-align:center; }
.content { padding-bottom: 240px; }

/* Плеер */
.player {
    position: fixed;
    bottom: 90px;
    left: 0;
    width: 100%;
    background: rgba(25,25,25,0.95);
    backdrop-filter: blur(15px);
    padding: 15px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-top-left-radius: 25px;
    border-top-right-radius: 25px;
    box-shadow: 0 -0 25px rgba(255,122,0,0.5);
    transform: translateY(150px);
    opacity: 0;
    transition: transform 0.5s ease, opacity 0.5s ease;
    z-index: 100;
}
.player.show { transform: translateY(0); opacity:1; }

/* Закрыть */
.close-btn {
    position: absolute;
    top: 10px; left: 15px;
    font-size: 20px;
    background: transparent;
    border: none;
    color: #ff7a00;
    cursor: pointer;
}
.close-btn:hover { transform: scale(1.2); }

/* Кнопки */
.player button {
    padding:15px 25px;
    margin:5px;
    border:none;
    border-radius:50px;
    background:linear-gradient(135deg,#ff7a00,#ffbb33);
    color:white;
    cursor:pointer;
    font-size:18px;
}

/* Название */
#title {
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

/* Прогресс */
.progress-container {
    width: 90%;
    margin-top:10px;
}

.progress {
    width: 100%;
    height: 6px;
    background: #333;
    border-radius: 10px;
    cursor: pointer;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,#ff7a00,#ffbb33);
    transition: width 0.2s linear;
}

/* Время */
.time {
    display:flex;
    justify-content: space-between;
    font-size: 12px;
    margin-top:5px;
    color:#aaa;
}

/* Список */
.song { padding:12px; border-bottom:1px solid #222; cursor:pointer; }
.song:hover { background:#1a1a1a; }

/* Navbar */
.navbar {
    position: fixed; bottom:0; left:10px; right:10px; height:75px;
    background: rgba(20,20,20,0.9);
    border-radius:25px;
    display:flex;
    justify-content: space-around;
    align-items:center;
}

.nav-item { color:#888; font-size:13px; cursor:pointer; }
.nav-item.active { color:#ff7a00; }

/* Секции */
.section { display:none; }
.section.active { display:block; }
</style>
</head>
<body>

<div class="content">
<div id="home" class="section active">
    <h1>🏠 Главная</h1>
    <div id="playlist"></div>
</div>
</div>

<!-- Плеер -->
<div class="player" id="player">
    <button class="close-btn" onclick="closePlayer()">✖</button>

    <audio id="audio"></audio>

    <div>
        <button onclick="prev()">⏮</button>
        <button onclick="play()">▶ / ⏸</button>
        <button onclick="next()">⏭</button>
    </div>

    <h2 id="title">Ничего не играет</h2>

    <!-- Прогресс -->
    <div class="progress-container">
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="time">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>
</div>

<!-- Navbar -->
<div class="navbar">
    <div class="nav-item active">🏠<br>Дом</div>
</div>

<script>
const songs = [
    { title:"Трек 1", src:"https://darov22.github.io/my-site/music/song1.mp3"},
    { title:"Трек 2", src:"https://darov22.github.io/my-site/music/song2.mp3"}
];

let current = 0;

const audio = document.getElementById("audio");
const title = document.getElementById("title");
const playlist = document.getElementById("playlist");
const player = document.getElementById("player");

const progress = document.getElementById("progress");
const progressBar = document.getElementById("progressBar");

const currentTimeEl = document.getElementById("currentTime");
const durationEl = document.getElementById("duration");

// Формат времени
function formatTime(sec){
    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    if(s < 10) s = "0" + s;
    return m + ":" + s;
}

// Загрузка
function loadSong(index){
    current = index;
    audio.src = songs[index].src;
    title.innerText = songs[index].title;
    player.classList.add("show");
}

// Play
function play(){
    audio.paused ? audio.play() : audio.pause();
}

// Next / Prev
function next(){
    current = (current + 1) % songs.length;
    loadSong(current);
    audio.play();
}

function prev(){
    current = (current - 1 + songs.length) % songs.length;
    loadSong(current);
    audio.play();
}

// Обновление времени
audio.addEventListener("timeupdate", () => {
    const currentTime = audio.currentTime;
    const duration = audio.duration;

    currentTimeEl.innerText = formatTime(currentTime);

    if(duration){
        durationEl.innerText = formatTime(duration);
        const percent = (currentTime / duration) * 100;
        progressBar.style.width = percent + "%";
    }
});

// Клик по прогрессу (перемотка)
progress.addEventListener("click", (e) => {
    const width = progress.clientWidth;
    const clickX = e.offsetX;
    const duration = audio.duration;

    audio.currentTime = (clickX / width) * duration;
});

// Закрытие
function closePlayer(){
    player.classList.remove("show");
    audio.pause();
    audio.currentTime = 0;
}

// Список
songs.forEach((song,index)=>{
    const div=document.createElement("div");
    div.className="song";
    div.innerText=song.title;
    div.onclick=()=>{ loadSong(index); audio.play(); };
    playlist.appendChild(div);
});
</script>

</body>
</html>
