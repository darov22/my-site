<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Music Player</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

/* Контент */
.content {
    padding-bottom: 140px; /* оставляем место под плеер и панель */
}

/* Список треков */
.song {
    padding: 12px;
    border-bottom: 1px solid #222;
    cursor: pointer;
    transition: 0.3s;
}
.song:hover {
    background: #1a1a1a;
}

/* ===== Плеер ===== */
.player-container {
    position: fixed;
    bottom: 15px; /* чуть выше панели */
    left: 10px;
    right: 10px;
    background: rgba(20,20,20,0.95);
    backdrop-filter: blur(12px);
    box-shadow: 0 -5px 25px rgba(255,122,0,0.4);
    border-radius: 25px;
    padding: 15px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.5s ease;
    z-index: 100;
    transform: translateY(80px); /* изначально почти скрыт */
}

/* верхняя «ручка» для визуальной подсказки */
.player-handle {
    width: 60px;
    height: 6px;
    background: #ff7a00;
    border-radius: 3px;
    margin-bottom: 10px;
}

/* кнопки плеера */
.player-buttons {
    display: flex;
    gap: 20px;
    margin-top: 10px;
}

.player-buttons button {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, #ff7a00, #ff4500);
    color: white;
    font-size: 20px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 4px 12px rgba(255,122,0,0.5);
    position: relative;
}

.player-buttons button:hover {
    transform: scale(1.15);
    box-shadow: 0 6px 20px rgba(255,122,0,0.7);
}

.player-buttons button:active {
    transform: scale(1);
}

#play-btn.playing::after {
    content: "";
    position: absolute;
    top: -10px; left: -10px; right: -10px; bottom: -10px;
    border-radius: 50%;
    background: rgba(255,122,0,0.2);
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: scale(0.8); opacity: 0.5; }
    50% { transform: scale(1.2); opacity: 0.1; }
    100% { transform: scale(0.8); opacity: 0.5; }
}

/* Плеер текст */
#title {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    max-width: 90%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* при активном треке плеер выезжает */
.player-container.active {
    transform: translateY(0);
}

/* ===== ПАНЕЛЬ ===== */
.navbar {
    position: fixed;
    bottom: 15px;
    left: 10px;
    right: 10px;
    height: 75px;
    background: rgba(20,20,20,0.9);
    backdrop-filter: blur(10px);
    border-radius: 25px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    box-shadow: 0 0 20px rgba(255,122,0,0.4);
}

.nav-item {
    color: #888;
    font-size: 13px;
    cursor: pointer;
    transition: 0.3s;
}
.nav-item.active {
    color: #ff7a00;
    text-shadow: 0 0 10px rgba(255,122,0,0.7);
}

/* секции */
.section {
    display: none;
}
.section.active {
    display: block;
}

/* 📱 адаптация под телефон */
@media (max-width: 600px) {
    .navbar {
        height: 90px;
        border-radius: 30px;
    }

    .nav-item {
        font-size: 15px;
    }

    .player-buttons button {
        width: 80px;
        height: 80px;
        font-size: 24px;
    }

    #title {
        font-size: 16px;
    }

    .player-container {
        padding: 20px;
    }
}
</style>
</head>
<body>

<div class="content">

<!-- HOME -->
<div id="home" class="section active">
    <h1>🏠 Главная</h1>
    <div id="playlist"></div>
</div>

<!-- TOP -->
<div id="top" class="section">
    <h1>🔥 Топ музыка</h1>
</div>

<!-- PLAYLIST -->
<div id="playlists" class="section">
    <h1>📁 Плейлисты</h1>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
    <h1>👤 Профиль</h1>
</div>

</div>

<!-- Плеер -->
<div class="player-container" id="player">
    <div class="player-handle"></div>
    <audio id="audio"></audio>
    <div class="player-buttons">
        <button onclick="prev()">⏮</button>
        <button id="play-btn" onclick="play()">▶</button>
        <button onclick="next()">⏭</button>
    </div>
    <div id="title">Ничего не играет</div>
</div>

<!-- ПАНЕЛЬ -->
<div class="navbar">
    <div class="nav-item active" onclick="openTab('home', this)">🏠<br>Дом</div>
    <div class="nav-item" onclick="openTab('top', this)">🔥<br>Топ</div>
    <div class="nav-item" onclick="openTab('playlists', this)">📁<br>Плейлисты</div>
    <div class="nav-item" onclick="openTab('profile', this)">👤<br>Профиль</div>
</div>

<script>
const songs = [
    {title: "Трек 1", src: "https://darov22.github.io/my-site/music/song1.mp3"},
    {title: "Трек 2", src: "https://darov22.github.io/my-site/music/song2.mp3"}
];

let current = 0;
const audio = document.getElementById("audio");
const title = document.getElementById("title");
const playlist = document.getElementById("playlist");
const playerContainer = document.getElementById("player");
const playBtn = document.getElementById("play-btn");

// Загрузка трека
function loadSong(index) {
    current = index;
    audio.src = songs[index].src;
    title.innerText = songs[index].title;

    // показываем плеер с анимацией
    playerContainer.classList.add("active");
}

// Воспроизведение / пауза
function play() {
    if (audio.paused) {
        audio.play();
        playBtn.innerText = "⏸";
        playBtn.classList.add("playing");
    } else {
        audio.pause();
        playBtn.innerText = "▶";
        playBtn.classList.remove("playing");
    }
}

// Следующий / предыдущий
function next() {
    current = (current + 1) % songs.length;
    loadSong(current);
    audio.play();
    playBtn.innerText = "⏸";
    playBtn.classList.add("playing");
}

function prev() {
    current = (current - 1 + songs.length) % songs.length;
    loadSong(current);
    audio.play();
    playBtn.innerText = "⏸";
    playBtn.classList.add("playing");
}

// Генерация списка
songs.forEach((song, index) => {
    const div = document.createElement("div");
    div.className = "song";
    div.innerText = song.title;
    div.onclick = () => {
        loadSong(index);
        audio.play();
        playBtn.innerText = "⏸";
        playBtn.classList.add("playing");
    };
    playlist.appendChild(div);
});

// вкладки
function openTab(tabId, el) {
    document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
    document.getElementById(tabId).classList.add("active");

    document.querySelectorAll(".nav-item").forEach(item => item.classList.remove("active"));
    el.classList.add("active");
}
</script>

</body>
</html>
