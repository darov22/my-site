<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Music Player</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

/* НЕОН */
.player::before {
    content:"";
    position:absolute;
    top:-50px;
    left:50%;
    transform:translateX(-50%);
    width:80%;
    height:120px;
    background: radial-gradient(circle, rgba(255,122,0,0.6), transparent);
    filter: blur(40px);
    z-index:-1;
}

/* Плеер */
.player {
    position: fixed;
    bottom: 90px;
    left: 0;
    width: 100%;
    background: rgba(25,25,25,0.95);
    backdrop-filter: blur(15px);
    padding: 20px 0 10px;
    border-top-left-radius: 25px;
    border-top-right-radius: 25px;
    transform: translateY(150px);
    opacity: 0;
    transition: 0.4s;
}
.player.show { transform: translateY(0); opacity:1; }

/* КРЕСТИК */
.close-btn {
    position:absolute;
    top:10px;
    left:10px;
    font-size:18px;
    background:none;
    border:none;
    color:#ff7a00;
    cursor:pointer;
    transition:0.2s;
}
.close-btn:hover { transform: scale(1.2); }
.close-btn:active { transform: scale(0.9); }

/* КНОПКИ */
.controls {
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:5px;
}

.controls button {
    background:linear-gradient(135deg,#ff7a00,#ffbb33);
    border:none;
    border-radius:50%;
    width:45px;
    height:45px;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}
.controls button:active { transform: scale(0.85); }

/* ПРОГРЕСС */
.progress-container {
    width:85%;
    margin:0 auto;
}
.progress {
    height:4px;
    background:#333;
    border-radius:10px;
    cursor:pointer;
}
.progress-bar {
    height:100%;
    width:0%;
    background:#ff7a00;
    border-radius:10px;
}

/* ВРЕМЯ */
.time {
    display:flex;
    justify-content:space-between;
    font-size:10px;
    color:#aaa;
}

/* НИЖНИЙ БЛОК */
.bottom-info {
    position:absolute;
    right:15px;
    bottom:10px;
    text-align:right;
}

.cover {
    width:50px;
    height:50px;
    background:linear-gradient(135deg,#ff7a00,#ffbb33);
    border-radius:10px;
    margin-bottom:5px;
}

#title {
    font-size:13px;
}

/* СПИСОК */
.song {
    padding:12px;
    border-bottom:1px solid #222;
    cursor:pointer;
}
.song:hover { background:#1a1a1a; }

/* NAVBAR */
.navbar {
    position: fixed;
    bottom:0;
    left:10px;
    right:10px;
    height:75px;
    background: rgba(20,20,20,0.9);
    border-radius:25px;
    display:flex;
    justify-content: space-around;
    align-items:center;
    box-shadow:0 0 25px rgba(255,122,0,0.5);
}
</style>
</head>
<body>

<h2>🎵 Музыка</h2>
<div id="playlist"></div>

<div class="player" id="player">

    <!-- КРЕСТИК -->
    <button class="close-btn" onclick="closePlayer()">✖</button>

    <audio id="audio"></audio>

    <div class="controls">
        <button onclick="prev()">⏮</button>
        <button id="playBtn" onclick="togglePlay()">▶</button>
        <button onclick="next()">⏭</button>
    </div>

    <div class="progress-container">
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="time">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>

    <div class="bottom-info">
        <div class="cover"></div>
        <div id="title">Трек</div>
    </div>
</div>

<div class="navbar">
    <div>🏠</div>
    <div>🔥</div>
    <div>📁</div>
    <div>👤</div>
</div>

<script>
const songs = [
    { title:"Трек 1", src:"https://darov22.github.io/my-site/music/song1.mp3"},
    { title:"Трек 2", src:"https://darov22.github.io/my-site/music/song2.mp3"}
];

let current = 0;

const audio = document.getElementById("audio");
const title = document.getElementById("title");
const playlist = document.getElementById("playlist");
const player = document.getElementById("player");

const progress = document.getElementById("progress");
const progressBar = document.getElementById("progressBar");

const currentTimeEl = document.getElementById("currentTime");
const durationEl = document.getElementById("duration");

const playBtn = document.getElementById("playBtn");

function formatTime(sec){
    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    if(s < 10) s = "0" + s;
    return m + ":" + s;
}

function loadSong(index){
    current = index;
    audio.src = songs[index].src;
    title.innerText = songs[index].title;
    player.classList.add("show");
}

function togglePlay(){
    audio.paused ? audio.play() : audio.pause();
}

function updatePlayBtn(){
    playBtn.innerText = audio.paused ? "▶" : "⏸";
}

function next(){
    current = (current + 1) % songs.length;
    loadSong(current);
    audio.play();
}

function prev(){
    current = (current - 1 + songs.length) % songs.length;
    loadSong(current);
    audio.play();
}

audio.addEventListener("timeupdate", () => {
    const currentTime = audio.currentTime;
    const duration = audio.duration;

    currentTimeEl.innerText = formatTime(currentTime);

    if(duration){
        durationEl.innerText = formatTime(duration);
        progressBar.style.width = (currentTime / duration * 100) + "%";
    }
});

audio.addEventListener("play", updatePlayBtn);
audio.addEventListener("pause", updatePlayBtn);

progress.addEventListener("click", (e) => {
    const width = progress.clientWidth;
    const clickX = e.offsetX;
    audio.currentTime = (clickX / width) * audio.duration;
});

/* ЗАКРЫТИЕ ПЛЕЕРА */
function closePlayer(){
    player.classList.remove("show");
    audio.pause();
    audio.currentTime = 0;
}

songs.forEach((song,index)=>{
    const div=document.createElement("div");
    div.className="song";
    div.innerText=song.title;
    div.onclick=()=>{ loadSong(index); audio.play(); };
    playlist.appendChild(div);
});
</script>

</body>
</html>
