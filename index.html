<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Music Player</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

/* Контент */
.content {
    padding-bottom: 240px; /* место под плеер + панель */
}

/* Плеер */
.player {
    position: fixed;
    bottom: 90px; /* над нижней панелью */
    left: 0;
    width: 100%;
    background: rgba(25,25,25,0.95);
    backdrop-filter: blur(15px);
    padding: 15px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-top-left-radius: 25px;
    border-top-right-radius: 25px;
    box-shadow: 0 -0 25px rgba(255,122,0,0.5);
    transform: translateY(150px); /* изначально скрыт */
    opacity: 0; /* невидим */
    transition: transform 0.5s ease, opacity 0.5s ease;
    z-index: 100;
}

/* Плеер видимый */
.player.show {
    transform: translateY(0); 
    opacity: 1; 
}

/* Кнопка закрытия */
.close-btn {
    position: absolute;
    top: 10px;
    left: 15px;
    font-size: 20px;
    background: transparent;
    border: none;
    color: #ff7a00;
    cursor: pointer;
    transition: transform 0.2s, color 0.2s;
}

.close-btn:hover {
    transform: scale(1.2);
    color: #ffbb33;
}

/* Кнопки плеера */
.player button.play-btn, .player button.prev-btn, .player button.next-btn {
    padding: 15px 25px;
    margin: 5px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ff7a00, #ffbb33);
    color: white;
    cursor: pointer;
    font-size: 18px;
    transition: transform 0.2s, box-shadow 0.2s;
}

.player button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px #ff7a00;
}

/* Название трека */
#title {
    margin-top: 10px;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 0 0 10px #ff7a00;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    0% { text-shadow: 0 0 5px #ff7a00; }
    100% { text-shadow: 0 0 15px #ff7a00; }
}

/* Список песен */
.song {
    padding: 12px;
    border-bottom: 1px solid #222;
    cursor: pointer;
    transition: 0.3s;
}

.song:hover {
    background: #1a1a1a;
}

/* Нижняя панель */
.navbar {
    position: fixed;
    bottom: 0; /* всегда внизу */
    left: 10px;
    right: 10px;
    height: 75px;
    background: rgba(20,20,20,0.9);
    backdrop-filter: blur(10px);
    border-radius: 25px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    box-shadow: 0 0 20px rgba(255,122,0,0.4);
    z-index: 99;
}

.nav-item {
    color: #888;
    font-size: 13px;
    cursor: pointer;
    transition: 0.3s;
    user-select: none;
}

.nav-item.active {
    color: #ff7a00;
    text-shadow: 0 0 10px rgba(255,122,0,0.7);
}

/* секции */
.section { display: none; }
.section.active { display: block; }

/* 📱 адаптация */
@media (max-width: 600px) {
    .navbar { height: 90px; }
    .nav-item { font-size: 15px; }
    .player button { padding: 18px 30px; font-size: 20px; }
    #title { font-size: 20px; }
    .content { padding-bottom: 270px; }
}
</style>
</head>
<body>

<div class="content">

<!-- HOME -->
<div id="home" class="section active">
    <h1>🏠 Главная</h1>
    <div id="playlist"></div>
</div>

<!-- TOP -->
<div id="top" class="section">
    <h1>🔥 Топ музыка</h1>
</div>

<!-- PLAYLIST -->
<div id="playlists" class="section">
    <h1>📁 Плейлисты</h1>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
    <h1>👤 Профиль</h1>
</div>

</div>

<!-- Плеер -->
<div class="player" id="player">
    <button class="close-btn" onclick="closePlayer()">✖</button>
    <audio id="audio"></audio>
    <div>
        <button class="prev-btn" onclick="prev()">⏮</button>
        <button class="play-btn" onclick="play()">▶ / ⏸</button>
        <button class="next-btn" onclick="next()">⏭</button>
    </div>
    <h2 id="title">Ничего не играет</h2>
</div>

<!-- Нижняя панель -->
<div class="navbar">
    <div class="nav-item active" onclick="openTab('home', this)">🏠<br>Дом</div>
    <div class="nav-item" onclick="openTab('top', this)">🔥<br>Топ</div>
    <div class="nav-item" onclick="openTab('playlists', this)">📁<br>Плейлисты</div>
    <div class="nav-item" onclick="openTab('profile', this)">👤<br>Профиль</div>
</div>

<script>
const songs = [
    { title: "Трек 1", src: "https://darov22.github.io/my-site/music/song1.mp3" },
    { title: "Трек 2", src: "https://darov22.github.io/my-site/music/song2.mp3" },
];

let current = 0;
const audio = document.getElementById("audio");
const title = document.getElementById("title");
const playlist = document.getElementById("playlist");
const player = document.getElementById("player");

// показать выбранный трек и плеер
function loadSong(index) {
    current = index;
    audio.src = songs[index].src;
    title.innerText = songs[index].title;

    player.classList.add("show");
}

// проигрывание / пауза
function play() { audio.paused ? audio.play() : audio.pause(); }
function next() { current = (current + 1) % songs.length; loadSong(current); audio.play(); }
function prev() { current = (current - 1 + songs.length) % songs.length; loadSong(current); audio.play(); }

// закрыть плеер
function closePlayer() {
    player.classList.remove("show");
}

// список песен
songs.forEach((song, index) => {
    const div = document.createElement("div");
    div.className = "song";
    div.innerText = song.title;
    div.onclick = () => { loadSong(index); audio.play(); };
    playlist.appendChild(div);
});

// вкладки
function openTab(tabId, el) {
    document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
    document.getElementById(tabId).classList.add("active");
    document.querySelectorAll(".nav-item").forEach(item => item.classList.remove("active"));
    el.classList.add("active");
}
</script>

</body>
</html>
