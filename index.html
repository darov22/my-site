<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Music Player</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #121212;
    color: white;
    text-align: center;
}

.player {
    margin-top: 50px;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    background: #1db954;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #17a74a;
}

.song {
    cursor: pointer;
    padding: 10px;
    border-bottom: 1px solid #333;
}

.song:hover {
    background: #222;
}

.progress {
    width: 80%;
    height: 5px;
    background: #333;
    margin: 20px auto;
    border-radius: 5px;
    cursor: pointer;
}

.progress-bar {
    height: 5px;
    background: #1db954;
    width: 0%;
    border-radius: 5px;
}
</style>

</head>
<body>

<h1>🎵 Мой плеер</h1>

<div class="player">
    <audio id="audio"></audio>

    <div>
        <button onclick="prev()">⏮</button>
        <button onclick="play()">▶ / ⏸</button>
        <button onclick="next()">⏭</button>
    </div>

    <h2 id="title">Ничего не играет</h2>

    <div class="progress" onclick="setProgress(event)">
        <div class="progress-bar" id="progressBar"></div>
    </div>
</div>

<div id="playlist"></div>

<script>
const songs = [
    {
        title: "Трек 1",
        src: "https://darov22.github.io/my-site/music/song1.mp3"
    },
    {
        title: "Трек 2",
        src: "https://darov22.github.io/my-site/music/song2.mp3"
    },
    {
        title: "Трек 3",
        src: "https://darov22.github.io/my-site/music/song3.mp3"
    }
];

let current = 0;
const audio = document.getElementById("audio");
const title = document.getElementById("title");
const playlist = document.getElementById("playlist");
const progressBar = document.getElementById("progressBar");

function loadSong(index) {
    current = index;
    audio.src = songs[index].src;
    title.innerText = songs[index].title;
}

function play() {
    if (audio.paused) {
        audio.play();
    } else {
        audio.pause();
    }
}

function next() {
    current++;
    if (current >= songs.length) current = 0;
    loadSong(current);
    audio.play();
}

function prev() {
    current--;
    if (current < 0) current = songs.length - 1;
    loadSong(current);
    audio.play();
}

// Прогресс бар
audio.addEventListener("timeupdate", () => {
    const percent = (audio.currentTime / audio.duration) * 100;
    progressBar.style.width = percent + "%";
});

function setProgress(e) {
    const width = e.currentTarget.clientWidth;
    const clickX = e.offsetX;
    const duration = audio.duration;
    audio.currentTime = (clickX / width) * duration;
}

// создаем плейлист
songs.forEach((song, index) => {
    const div = document.createElement("div");
    div.className = "song";
    div.innerText = song.title;
    div.onclick = () => {
        loadSong(index);
        audio.play();
    };
    playlist.appendChild(div);
});

loadSong(0);
</script>

</body>
</html>
